# ~/.tmux.conf — tuned for managing AI agent windows
# Reload after editing with:  tmux source-file ~/.tmux.conf   (or prefix + r)

# ─────────────────────────────────────────────────────────────
# Prefix: keep Ctrl-b, but also add Ctrl-a (easier reach, like screen)
# ─────────────────────────────────────────────────────────────
set -g prefix C-a
bind C-a send-prefix          # press Ctrl-a twice to send a literal Ctrl-a
# Ctrl-b still works too (default), so muscle memory is fine either way.

# ─────────────────────────────────────────────────────────────
# General quality-of-life
# ─────────────────────────────────────────────────────────────
set -g mouse on               # click panes/windows, scroll, drag-resize
set -g history-limit 100000   # big scrollback — agents are chatty
set -sg escape-time 10        # snappier; avoids vim/nvim esc lag
set -g focus-events on
set -g base-index 1           # windows start at 1 (matches the number row)
setw -g pane-base-index 1
set -g renumber-windows on    # keep window numbers gapless when one closes
set -g set-clipboard on       # yank to system clipboard
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor

# Auto-name windows after the running program (fallback for plain windows).
# Note: pi/Claude run under node, so they'd show as "node" — use prefix+P below
# to open a properly-named "pi" window instead.
set -g allow-rename off
setw -g automatic-rename on

# prefix + P  →  new window named "pi" that launches pi automatically
bind P new-window -n pi -c "#{pane_current_path}" "pi"

# prefix + ?  →  popup cheat sheet of these custom keybindings
# (overrides the default unfiltered key list, which is overwhelming)
bind ? display-popup -w 70 -h 38 -E "cat ~/.tmux-cheatsheet.txt; read -n1"

# ─────────────────────────────────────────────────────────────
# Reload config
# ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ─────────────────────────────────────────────────────────────
# Splits — intuitive | and -, open in the current path
# ─────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─────────────────────────────────────────────────────────────
# Pane navigation — vim-style hjkl (no prefix needed via Alt)
# ─────────────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Alt+arrow to switch panes without the prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Resize panes (repeatable: hold the key after prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─────────────────────────────────────────────────────────────
# Window navigation — Shift+arrows or Alt+number, no prefix
# ─────────────────────────────────────────────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ─────────────────────────────────────────────────────────────
# Copy mode — vim keys
# ─────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ─────────────────────────────────────────────────────────────
# Status bar — shows session + windows; highlights active agent
# ─────────────────────────────────────────────────────────────
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa] "

set -g status-right-length 60
set -g status-right "#[fg=#6c7086]%a %d %b #[fg=#cdd6f4]%H:%M "

setw -g window-status-format "  #I:#W  "
setw -g window-status-current-format "#[bg=#a6e3a1,fg=#1e1e2e,bold] #I:#W #[default]"
setw -g window-status-current-style "fg=#1e1e2e,bg=#a6e3a1"

# Visual ping when a window has activity (e.g. an agent finished)
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#f9e2af,bold"

# Pane borders — make the active agent's pane obvious
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
